[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd frontend && npm ci"
]

[phases.build]
cmds = [
    "cd frontend && npm run build"
]

[start]
cmd = "python setup_db.py && gunicorn app:app --bind 0.0.0.0:$PORT"
